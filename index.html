<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dó-Ré-Mi Gestão</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f1117;--bg2:#161b26;--bg3:#1e2535;--bg4:#252d3d;
  --border:#2a3347;--border2:#344060;
  --text:#e8ecf4;--text2:#8b9ab8;--text3:#556080;
  --purple:#7c6ff7;--purple2:#6259e8;--purple-bg:#1e1b3a;--purple-light:#a99ff8;
  --green:#34d399;--green-bg:#0d2b22;--green-text:#6ee7b7;
  --red:#f87171;--red-bg:#2b1111;--red-text:#fca5a5;
  --amber:#fbbf24;--amber-bg:#2b1f06;--amber-text:#fcd34d;
  --blue:#60a5fa;--blue-bg:#0f1f3d;--blue-text:#93c5fd;
  --teal:#2dd4bf;--teal-bg:#0d2523;
  --font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
  --radius:10px;--radius-sm:6px;--radius-lg:14px;
  --shadow:0 4px 24px rgba(0,0,0,.4);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* Layout */
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:240px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:60px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 28px;background:var(--bg2);flex-shrink:0}
.content{flex:1;overflow-y:auto;padding:28px}

/* Sidebar */
.sidebar-logo{padding:22px 20px 16px;border-bottom:1px solid var(--border)}
.logo-mark{width:36px;height:36px;background:linear-gradient(135deg,var(--purple),var(--purple2));border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:10px}
.logo-mark svg{width:20px;height:20px;fill:white}
.logo-name{font-size:14px;font-weight:600;color:var(--text);letter-spacing:-.01em}
.logo-sub{font-size:11px;color:var(--text3);margin-top:2px}
.nav{padding:10px 0;flex:1;overflow-y:auto}
.nav-section{padding:16px 20px 6px;font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.08em;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 20px;font-size:13px;font-weight:400;color:var(--text2);cursor:pointer;border-left:2px solid transparent;transition:all .15s;user-select:none}
.nav-item:hover{color:var(--text);background:var(--bg3)}
.nav-item.active{color:var(--purple-light);border-left-color:var(--purple);background:var(--purple-bg);font-weight:500}
.nav-item svg{width:15px;height:15px;flex-shrink:0;opacity:.7}
.nav-item.active svg{opacity:1}
.sidebar-footer{padding:16px 20px;border-top:1px solid var(--border)}
.sidebar-footer p{font-size:11px;color:var(--text3)}

/* Topbar */
.page-title{font-size:17px;font-weight:600;color:var(--text);letter-spacing:-.02em}
.topbar-right{display:flex;align-items:center;gap:10px}

/* Buttons */
.btn{padding:7px 14px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:transparent;color:var(--text2);font-size:12px;font-weight:500;cursor:pointer;font-family:var(--font);transition:all .15s;white-space:nowrap}
.btn:hover{background:var(--bg3);color:var(--text);border-color:var(--border2)}
.btn-primary{background:var(--purple);border-color:var(--purple);color:#fff}
.btn-primary:hover{background:var(--purple2);border-color:var(--purple2)}
.btn-sm{padding:5px 10px;font-size:11px}
.btn-whats{background:#075e54;border:1px solid #128c7e;color:#dcf8c6;font-size:11px;padding:5px 10px;border-radius:var(--radius-sm);cursor:pointer;font-family:var(--font);font-weight:500;white-space:nowrap;transition:all .15s}
.btn-whats:hover{background:#128c7e}
.btn-danger{background:var(--red-bg);border-color:var(--red);color:var(--red-text)}
.btn-danger:hover{background:#3d1414}

/* Cards */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.card-title{font-size:13px;font-weight:600;color:var(--text);letter-spacing:-.01em}
.metric-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:20px}
.metric-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 18px;transition:border-color .15s;cursor:default}
.metric-card:hover{border-color:var(--border2)}
.metric-label{font-size:11px;color:var(--text3);font-weight:500;letter-spacing:.02em;text-transform:uppercase;margin-bottom:8px}
.metric-value{font-size:24px;font-weight:600;color:var(--text);letter-spacing:-.03em;line-height:1}
.metric-sub{font-size:11px;color:var(--text3);margin-top:6px}
.metric-dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:5px;vertical-align:middle}

/* Tables */
.table-wrap{overflow-x:auto;border-radius:var(--radius-lg);border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:10px 14px;color:var(--text3);font-weight:600;font-size:10px;letter-spacing:.06em;text-transform:uppercase;border-bottom:1px solid var(--border);background:var(--bg3);white-space:nowrap}
td{padding:11px 14px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr{transition:background .1s}
tbody tr:hover td{background:var(--bg3)}

/* Badges */
.badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:20px;font-size:10px;font-weight:600;letter-spacing:.02em}
.badge-pago{background:var(--green-bg);color:var(--green-text);border:1px solid #1a4535}
.badge-atrasado{background:var(--red-bg);color:var(--red-text);border:1px solid #4a1e1e}
.badge-aguardando{background:var(--amber-bg);color:var(--amber-text);border:1px solid #4a3510}
.badge-ativo{background:var(--purple-bg);color:var(--purple-light);border:1px solid #2e2660}
.badge-inativo{background:var(--bg3);color:var(--text3);border:1px solid var(--border)}
.chip{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:500;background:var(--bg3);color:var(--text2);border:1px solid var(--border2)}

/* Avatar */
.avatar{width:30px;height:30px;border-radius:50%;background:var(--purple-bg);border:1px solid var(--purple2);color:var(--purple-light);font-size:11px;font-weight:600;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}

/* Forms */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-group label{font-size:11px;font-weight:500;color:var(--text3);letter-spacing:.03em;text-transform:uppercase}
.form-group input,.form-group select,.form-group textarea{padding:8px 12px;border:1px solid var(--border2);border-radius:var(--radius-sm);font-size:13px;background:var(--bg3);color:var(--text);font-family:var(--font);transition:border-color .15s;outline:none}
.form-group input:focus,.form-group select:focus{border-color:var(--purple)}
.form-group select option{background:var(--bg2)}
.input-sm{padding:5px 8px;border:1px solid var(--border2);border-radius:var(--radius-sm);font-size:12px;background:var(--bg3);color:var(--text);font-family:var(--mono);width:56px;text-align:center;outline:none}
.input-sm:focus{border-color:var(--purple)}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:1000;padding:16px}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-lg);padding:24px;width:520px;max-width:100%;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow)}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.modal-title{font-size:15px;font-weight:600;color:var(--text);letter-spacing:-.02em}
.modal-close{width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;font-family:var(--font);transition:all .15s}
.modal-close:hover{background:var(--bg3);color:var(--text)}

/* Tabs */
.tabs{display:flex;gap:2px;margin-bottom:18px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:3px;width:fit-content}
.tab{padding:6px 14px;font-size:12px;font-weight:500;cursor:pointer;border-radius:5px;color:var(--text3);transition:all .15s;white-space:nowrap}
.tab.active{background:var(--purple-bg);color:var(--purple-light);border:1px solid #2e2660}
.tab:not(.active):hover{color:var(--text2)}

/* Bars */
.pgto-bar{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.pgto-label{font-size:12px;color:var(--text2);width:90px;flex-shrink:0}
.pgto-track{flex:1;height:5px;background:var(--bg3);border-radius:3px;overflow:hidden}
.pgto-fill{height:100%;border-radius:3px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.pgto-val{font-size:12px;font-weight:600;color:var(--text);min-width:90px;text-align:right;font-family:var(--mono)}

/* Misc */
.empty-state{text-align:center;padding:40px 20px;color:var(--text3);font-size:13px}
.section-2col{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.divider{height:1px;background:var(--border);margin:16px 0}
.mono{font-family:var(--mono);font-size:12px}
.status-select{border:none;background:transparent;cursor:pointer;font-size:11px;font-weight:600;font-family:var(--font);outline:none;padding:3px 6px;border-radius:20px}
.tag-julia{background:#0d2b1e;color:#4ade80;border:1px solid #1a4530;font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px}
.tag-lucas{background:var(--blue-bg);color:var(--blue-text);border:1px solid #1a3060;font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px}
.tag-dinheiro{background:var(--amber-bg);color:var(--amber-text);border:1px solid #4a3010;font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px}
@media(max-width:768px){
  .sidebar{display:none}
  .metric-grid{grid-template-columns:1fr 1fr}
  .section-2col{grid-template-columns:1fr}
  .form-grid{grid-template-columns:1fr}
}

/* Login */
.login-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:0}
.login-card{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-lg);padding:36px 40px;width:360px;box-shadow:var(--shadow)}
.login-logo{display:flex;align-items:center;gap:12px;margin-bottom:28px}
.login-logo-mark{width:44px;height:44px;background:linear-gradient(135deg,var(--purple),var(--purple2));border-radius:12px;display:flex;align-items:center;justify-content:center}
.login-logo-mark svg{width:24px;height:24px;fill:white}
.login-title{font-size:18px;font-weight:600;color:var(--text);letter-spacing:-.02em}
.login-sub{font-size:12px;color:var(--text3);margin-top:2px}
.login-field{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
.login-field label{font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.04em;text-transform:uppercase}
.login-field input{padding:10px 14px;border:1px solid var(--border2);border-radius:var(--radius-sm);font-size:14px;background:var(--bg3);color:var(--text);font-family:var(--font);outline:none;transition:border-color .15s}
.login-field input:focus{border-color:var(--purple)}
.login-btn{width:100%;padding:11px;background:var(--purple);border:none;border-radius:var(--radius-sm);color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:var(--font);margin-top:6px;transition:background .15s}
.login-btn:hover{background:var(--purple2)}
.login-error{font-size:12px;color:var(--red);margin-top:8px;text-align:center;min-height:18px}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block;margin-right:6px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.sync-dot.offline{background:var(--amber);animation:none}
.sync-dot.error{background:var(--red);animation:none}
</style>
</head>
<body>

<div class="login-screen" id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-mark"><svg viewBox="0 0 24 24"><path d="M12 3v10.55A4 4 0 1010 17V7h4V3h-2z"/></svg></div>
      <div><div class="login-title">Dó-Ré-Mi Gestão</div><div class="login-sub">Sistema de Gestão Escolar</div></div>
    </div>
    <div class="login-field"><label>Usuário</label><input type="text" id="l-user" placeholder="seu usuário" autocomplete="username"></div>
    <div class="login-field"><label>Senha</label><input type="password" id="l-pass" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <button class="login-btn" onclick="doLogin()">Entrar</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<div class="app" style="display:none" id="main-app">

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-mark">
      <svg viewBox="0 0 24 24"><path d="M12 3v10.55A4 4 0 1010 17V7h4V3h-2z"/></svg>
    </div>
    <div class="logo-name">Dó-Ré-Mi Gestão</div>
    <div class="logo-sub">Escola de Música</div>
  </div>
  <nav class="nav">
    <div class="nav-section">Principal</div>
    <div class="nav-item active" onclick="navigate('inicio')" id="nav-inicio">
      <svg viewBox="0 0 16 16" fill="currentColor"><path d="M8 2L2 7v7h4v-4h4v4h4V7z"/></svg>Início
    </div>
    <div class="nav-item" onclick="navigate('alunos')" id="nav-alunos">
      <svg viewBox="0 0 16 16" fill="currentColor"><circle cx="8" cy="5" r="3"/><path d="M2 14c0-3 2.7-5 6-5s6 2 6 5" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>Alunos
    </div>
    <div class="nav-item" onclick="navigate('mensalidades')" id="nav-mensalidades">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3"><rect x="2" y="3" width="12" height="10" rx="2"/><path d="M5 8h6M5 11h4"/></svg>Mensalidades
    </div>
    <div class="nav-item" onclick="navigate('whatsapp')" id="nav-whatsapp">
      <svg viewBox="0 0 16 16" fill="currentColor"><path d="M8 2C4.7 2 2 4.5 2 7.5c0 1 .3 2 .8 2.8L2 14l3.8-.8c.7.4 1.5.6 2.2.6 3.3 0 6-2.5 6-5.5S11.3 2 8 2z"/></svg>WhatsApp
    </div>
    <div class="nav-section">Financeiro</div>
    <div class="nav-item" onclick="navigate('financeiro')" id="nav-financeiro">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3"><path d="M3 12V6l5-4 5 4v6"/><rect x="6" y="8" width="4" height="4" fill="currentColor" stroke="none"/></svg>Relatórios
    </div>
  </nav>
  <div class="sidebar-footer">
    <p>Dó-Ré-Mi Gestão v2.0 — 2025</p>
  </div>
</div>

<!-- MAIN -->
<div class="main">
  <div class="topbar">
    <div class="page-title" id="page-title">Início</div>
    <div class="topbar-right" id="topbar-actions"></div>
  </div>
  <div class="content" id="content"></div>
</div>

</div>

<!-- MODAL CONTAINER -->
<div id="modal-root"></div>

<script>
const PIX={'Pix Júlia':'65976726000100','Pix Lucas':'35483341000140'};
const MESES=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const MES_ATUAL=MESES[new Date().getMonth()];
const STORE='doremi_gestao_v1';

let db=JSON.parse(localStorage.getItem(STORE)||'null')||{
  alunos:[
    {id:1,nome:'Anahí',instrumento:'Violão',professor:'Carlos',dia:10,valor:150,tel:'5551998671885',responsavel:'',pgto:'Pix Júlia',status:'Ativo',mesEntrada:'Janeiro'},
    {id:2,nome:'Arthur (Laine)',instrumento:'Piano',professor:'Fernanda',dia:5,valor:200,tel:'5551999990002',responsavel:'',pgto:'Pix Lucas',status:'Ativo',mesEntrada:'Janeiro'},
    {id:3,nome:'Dárien',instrumento:'Canto',professor:'Fernanda',dia:15,valor:180,tel:'5551999990003',responsavel:'',pgto:'Pix Júlia',status:'Ativo',mesEntrada:'Janeiro'},
    {id:4,nome:'Eduardo',instrumento:'Bateria',professor:'Ricardo',dia:20,valor:220,tel:'5551999990004',responsavel:'',pgto:'Pix Lucas',status:'Ativo',mesEntrada:'Janeiro'},
    {id:5,nome:'Fernanda',instrumento:'Violino',professor:'Carlos',dia:10,valor:250,tel:'5551999990005',responsavel:'',pgto:'Dinheiro',status:'Ativo',mesEntrada:'Janeiro'},
  ],
  pagamentos:[],
  nextId:6
};

function save(){localStorage.setItem(STORE,JSON.stringify(db));}
function fmt(v){return'R$ '+Number(v).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});}
function getAtivos(){return db.alunos.filter(a=>a.status==='Ativo');}
function getPagMes(mes){return db.pagamentos.filter(p=>p.mes===mes);}
function getPag(alunoId,mes){return db.pagamentos.find(p=>p.alunoId===alunoId&&p.mes===mes);}
function getOrCreatePag(alunoId,mes){
  let p=getPag(alunoId,mes);
  if(!p){const a=db.alunos.find(x=>x.id===alunoId);p={alunoId,mes,status:'Aguardando',valor:a.valor,valorAjustado:a.valor,aulasDadas:4,totalAulas:4,data:new Date().toISOString()};db.pagamentos.push(p);}
  return p;
}
function initials(n){return n.split(' ').slice(0,2).map(x=>x[0]||'').join('').toUpperCase();}
function pgtoTag(pgto){
  if(pgto==='Pix Júlia')return'<span class="tag-julia">Pix Júlia</span>';
  if(pgto==='Pix Lucas')return'<span class="tag-lucas">Pix Lucas</span>';
  return'<span class="tag-dinheiro">Dinheiro</span>';
}

// Navigation
function navigate(page){
  currentPageName = page;
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  const navEl = document.getElementById('nav-'+page);
  if(navEl) navEl.classList.add('active');
  const titles={inicio:'Início',alunos:'Alunos',mensalidades:'Mensalidades',whatsapp:'WhatsApp',financeiro:'Relatórios'};
  document.getElementById('page-title').textContent=titles[page]||page;
  document.getElementById('topbar-actions').innerHTML=`
    <div style="display:flex;align-items:center;gap:8px">
      <span id="sync-dot" class="sync-dot offline" title="Salvando localmente"></span>
      <span style="font-size:11px;color:var(--text3);margin-right:4px">lucas</span>
      <button class="btn btn-sm" onclick="exportarDados()" title="Baixar backup">Backup</button>
      <button class="btn btn-sm" onclick="importarDados()" title="Restaurar backup">Importar</button>
      <button class="btn btn-sm" onclick="doLogout()" style="color:var(--red);border-color:var(--red)">Sair</button>
    </div>`;
  setTimeout(updateSyncUI, 100);
  const renders={inicio:renderInicio,alunos:renderAlunos,mensalidades:renderMensalidades,whatsapp:renderWhatsApp,financeiro:renderFinanceiro};
  renders[page]();
}

// INÍCIO
function renderInicio(){
  const c = document.getElementById('content');
  if (!c) return;
  firstRenderDone = true;
  const ativos=getAtivos();
  const pags=getPagMes(MES_ATUAL);
  const totalPrev=ativos.reduce((s,a)=>s+a.valor,0);
  const pagos=pags.filter(p=>p.status==='Pago');
  const totalPago=pagos.reduce((s,p)=>s+(p.valorAjustado||p.valor),0);
  const totalAtras=pags.filter(p=>p.status==='Atrasado').reduce((s,p)=>s+(p.valorAjustado||p.valor),0);
  const taxa=totalPrev>0?Math.round(totalPago/totalPrev*100):0;
  const recentes=[...db.pagamentos].sort((a,b)=>new Date(b.data)-new Date(a.data)).slice(0,6);

  document.getElementById('content').innerHTML=`
  <div class="metric-grid">
    <div class="metric-card"><div class="metric-label">Alunos ativos</div><div class="metric-value">${ativos.length}</div><div class="metric-sub">${db.alunos.filter(a=>a.status!=='Ativo').length} inativos</div></div>
    <div class="metric-card"><div class="metric-label">Previsto — ${MES_ATUAL}</div><div class="metric-value">${fmt(totalPrev)}</div><div class="metric-sub">${ativos.length} mensalidades</div></div>
    <div class="metric-card"><div class="metric-label">Recebido — ${MES_ATUAL}</div><div class="metric-value" style="color:var(--green)">${fmt(totalPago)}</div><div class="metric-sub"><span class="metric-dot" style="background:var(--green)"></span>${taxa}% do previsto</div></div>

      return`<tr>
        <td><div style="display:flex;align-items:center;gap:8px"><div class="avatar">${initials(a.nome)}</div><div><div style="font-size:12px;font-weight:500">${a.nome}</div>${a.responsavel?`<div style="font-size:10px;color:var(--text3)">${a.responsavel}</div>`:''}</div></div></td>

        <td><select class="status-select badge badge-${st.toLowerCase()}" onchange="updStatus(${a.id},'${mes}',this.value)">

        </select></td>
        <td><button class="btn-whats" onclick="abrirWhats(${a.id},'${mes}')">Enviar</button></td>
      </tr>`;
    }).join('')}
    </tbody>
  </table></div>`;
}
function updAulas(id,mes,ad,ta,vb){
  const p=getOrCreatePag(id,mes);
  p.aulasDadas=parseInt(ad)||0;p.totalAulas=parseInt(ta)||4;
  p.valorAjustado=Math.round((vb/p.totalAulas)*p.aulasDadas*100)/100;
  p.data=new Date().toISOString();saveToCloud();renderMensalidadesTabela();
}
function updStatus(id,mes,st){
  const p=getOrCreatePag(id,mes);p.status=st;p.data=new Date().toISOString();saveToCloud();
}

function abrirWhats(id,mes){
  const a=db.alunos.find(x=>x.id===id);
  if(!a?.tel)return alert('Telefone não cadastrado para este aluno');
  const p=getPag(a.id,mes);
  const val=p?.valorAjustado??a.valor;
  const nomeMsg=a.responsavel||a.nome;
  const inteiro=Math.floor(val);
  const cents=String(Math.round((val%1)*100)).padStart(2,'0');
  let pgtoBloco='';
  if(a.pgto==='Pix Júlia')pgtoBloco=` Chave Pix: ${PIX['Pix Júlia']}`;
  else if(a.pgto==='Pix Lucas')pgtoBloco=` Chave Pix: ${PIX['Pix Lucas']}`;
  else pgtoBloco=' Por favor acerte o valor na próxima aula.';
  const msg=`Olá ${nomeMsg}! Sua mensalidade de *R$ ${inteiro},${cents}* referente a ${mes} vence em breve. Por favor realize o pagamento.${pgtoBloco} Obrigado! 🎵`;
  window.open(`https://wa.me/${a.tel}?text=${encodeURIComponent(msg)}`,'_blank');
}
function enviarTodos(){
  const ativos=getAtivos().filter(a=>a.tel);
  if(!ativos.length)return alert('Nenhum aluno com telefone cadastrado');
  if(!confirm(`Abrir ${ativos.length} links do WhatsApp?`))return;
  ativos.forEach((a,i)=>setTimeout(()=>abrirWhats(a.id,MES_ATUAL),i*900));
}

        db = val;
        localStorage.setItem(STORE, JSON.stringify(db));
        // Only re-render after first render is done (avoid overriding initial navigate)
        if (firstRenderDone) {
          const content = document.getElementById('content');
          if (content && content.innerHTML.trim() !== '') {
            navigate(getCurrentPage());
          }
        }
      }
    });
  } catch(e) {
    console.error("Firebase erro:", e);
    syncStatus = 'error';
  }
}

function saveToCloud() {
  save();
  if (!firebaseReady || !fbdb) return;
  fbdb.ref('doremi/dados').set(db)
    .then(() => { syncStatus = 'synced'; updateSyncUI(); })
    .catch(e => { syncStatus = 'error'; updateSyncUI(); console.error(e); });
}

function updateSyncUI() {
  const dot = document.getElementById('sync-dot');
  if (!dot) return;
  dot.className = 'sync-dot' + (syncStatus === 'synced' ? '' : syncStatus === 'error' ? ' error' : ' offline');
  dot.title = syncStatus === 'synced' ? 'Sincronizado com a nuvem' : syncStatus === 'error' ? 'Erro ao sincronizar' : 'Salvando localmente';
}

let currentPageName = 'inicio';
function getCurrentPage() { return currentPageName; }

// LOGIN
function doLogin() {
  const u = document.getElementById('l-user').value.trim();
  const p = document.getElementById('l-pass').value;
  const err = document.getElementById('login-error');
  if (u === USUARIO && p === SENHA_HASH) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('main-app').style.display = 'flex';
    sessionStorage.setItem('doremi_auth', '1');
    initFirebase();
    navigate('inicio');
  } else {
    err.textContent = 'Usuário ou senha incorretos';
    document.getElementById('l-pass').value = '';
    setTimeout(() => err.textContent = '', 3000);
  }
}

function doLogout() {
  if (!confirm('Deseja sair do sistema?')) return;
  sessionStorage.removeItem('doremi_auth');
  document.getElementById('main-app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('l-user').value = '';
  document.getElementById('l-pass').value = '';
}

// Manter sessão ao recarregar a página
window.addEventListener('DOMContentLoaded', () => {
  if (sessionStorage.getItem('doremi_auth') === '1') {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('main-app').style.display = 'flex';
    initFirebase();
    requestAnimationFrame(() => setTimeout(() => navigate('inicio'), 50));
  }
});

// BACKUP
function exportarDados() {
  const json = JSON.stringify(db, null, 2);
  const blob = new Blob([json], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'backup_doremi_' + new Date().toISOString().split('T')[0] + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

function importarDados() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = '.json';
  input.onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const dados = JSON.parse(ev.target.result);
        if (!dados.alunos) throw new Error('Arquivo inválido');
        if (!confirm('Isso vai substituir todos os dados atuais. Continuar?')) return;
        db = dados;
        saveToCloud();
        navigate(currentPageName);
        alert('Dados importados com sucesso!');
      } catch(err) {
        alert('Erro ao importar: ' + err.message);
      }
    };
    reader.readAsText(file);
  };
  input.click();
}
</script>
