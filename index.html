<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dó Ré Mi — Sistema de Gestão</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #111820;
  --surface: #18202A;
  --text: #F0EFEB;
  --purple: #3ABFBF;
}

body{margin:0;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text)}

/* LOGIN */
#loginScreen{display:flex;align-items:center;justify-content:center;height:100vh}
.login-box{background:var(--surface);padding:30px;border-radius:10px;width:300px}
.login-box h2{margin-bottom:15px}
.login-box input{width:100%;margin-bottom:10px;padding:10px;border:none;border-radius:6px}
.login-box button{width:100%;padding:10px;background:var(--purple);border:none;color:#000;font-weight:bold;border-radius:6px;cursor:pointer}

/* APP ORIGINAL */
#app{display:none;height:100vh;display:flex}
.sidebar{width:220px;background:var(--surface);padding:20px}
.main{flex:1;display:flex;flex-direction:column}
.topbar{background:var(--surface);padding:10px 20px;display:flex;justify-content:space-between}
.content{padding:20px}

</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen" style="display:flex;align-items:center;justify-content:center;height:100vh;background:#111820;">
  <div style="background:#18202A;padding:30px;border-radius:10px;width:300px;">
    <h2 style="margin-bottom:15px;">Login</h2>
    <input type="text" id="user" placeholder="Usuário" style="width:100%;margin-bottom:10px;padding:8px;">
    <input type="password" id="pass" placeholder="Senha" style="width:100%;margin-bottom:15px;padding:8px;">
    <button onclick="login()" style="width:100%;padding:10px;background:#3ABFBF;border:none;color:#000;font-weight:bold;">Entrar</button>
    <p id="erro" style="color:red;font-size:12px;margin-top:10px;"></p>
  </div>
</div>


<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <h2>Login</h2>
    <input type="text" id="user" placeholder="Usuário">
    <input type="password" id="pass" placeholder="Senha">
    <button onclick="login()">Entrar</button>
    <p id="erro" style="color:red;font-size:12px"></p>
  </div>
</div>

<!-- DASHBOARD ORIGINAL -->
<div id="app" style="display:none;">
  <div class="sidebar">
    <h3>Dó Ré Mi</h3>
    <p>Sistema de Gestão</p>
  </div>

  <div class="main">
    <div class="topbar">
      <span>Painel</span>
      <button onclick="logout()">Sair</button>
    </div>

    <div class="content">
      <h1>Dashboard</h1>
      <p>Seu sistema original continua funcionando normalmente aqui.</p>
    </div>
  </div>
</div>

<script>
const USER = "Lucas";
const PASS = "doremi2024";

function login(){
  const u = document.getElementById("user").value;
  const p = document.getElementById("pass").value;

  if(u === USER && p === PASS){
    localStorage.setItem("logado","true");
    mostrarSistema();
  }else{
    document.getElementById("erro").innerText = "Usuário ou senha inválidos";
  }
}

function mostrarSistema(){
  document.getElementById("loginScreen").style.display = "none";
  document.getElementById("app").style.display = "flex";
}

function logout(){
  localStorage.removeItem("logado");
  location.reload();
}

if(localStorage.getItem("logado") === "true"){
  mostrarSistema();
}
</script>

</script>

</body>
</html>
